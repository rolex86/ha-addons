name: "Stremio Prehraj.to Add-on"
slug: "stremio_prehrajto"
description: "Stremio stream source add-on s resolverem prehraj.to."
version: "0.1.14"
url: "https://github.com/rolex86/ha-addons/tree/master/stremio-prehrajto-addon"

arch:
  - aarch64
  - amd64
  - armv7
  - i386

startup: services
boot: auto
init: false

webui: "http://[HOST]:[PORT:7654]/configure"
panel_icon: mdi:play-circle-outline
panel_title: "Stremio Prehraj.to"

ports:
  7654/tcp: 7654
ports_description:
  7654/tcp: "Stremio addon HTTP"

map:
  - data:rw

options:
  base_url: "http://homeassistant.local:7654"
  tmdb_api_key: ""
  tmdb_language: "cs-CZ"
  prehrajto_base: "https://prehraj.to"
  prehrajto_user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122 Safari/537.36"
  default_search_limit: 20
  default_streams_limit: 5
  default_premium: false
  default_sort_by: "size_desc"
  default_max_size_gb: 0
  default_audio_preference: "any"
  default_quality_preference: "any"
  cache_ttl_seconds: 900
  log_level: "debug"
  config_secret: "change-me-please"

schema:
  base_url: str
  tmdb_api_key: password
  tmdb_language: str
  prehrajto_base: str
  prehrajto_user_agent: str
  default_search_limit: int(5,80)
  default_streams_limit: int(1,15)
  default_premium: bool
  default_sort_by: list(size_desc|size_asc|relevance_desc|balanced)
  default_max_size_gb: float(0,500)
  default_audio_preference: list(any|prefer_cz_dub|prefer_cz_sk|prefer_original)
  default_quality_preference: list(any|prefer_4k|prefer_1080p|prefer_720p|avoid_4k)
  cache_ttl_seconds: int(30,86400)
  log_level: list(debug|info|warn|error|warning)
  config_secret: password
